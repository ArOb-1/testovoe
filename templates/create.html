<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание сотрудника</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <h1 class="text-3xl font-bold mb-8">Создание сотрудника</h1>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/create" enctype="multipart/form-data" class="bg-white rounded-lg shadow p-6">
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Фамилия *</label>
                    <input type="text" name="last_name" required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Имя *</label>
                    <input type="text" name="first_name" required
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Отчество</label>
                    <input type="text" name="patronymic"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Телефон *</label>
                    <input type="tel" name="phone" required placeholder="+7XXXXXXXXXX"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Дата рождения *</label>
                    <input type="text" name="birth_date" required placeholder="31.12.2015"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Пол *</label>
                    <div class="mt-2 flex gap-4">
                        <label class="inline-flex items-center">
                            <input type="radio" name="gender" value="Муж" required class="form-radio">
                            <span class="ml-2">Муж</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="gender" value="Жен" required class="form-radio">
                            <span class="ml-2">Жен</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Фото</label>
                    <input type="file" name="photo" accept="image/*"
                           class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <p class="text-xs text-gray-500 mt-1">Максимальный размер: 200 КБ</p>
                </div>
                <div class="flex gap-4 pt-4 border-t">
                    <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">
                        Сохранить
                    </button>
                    <a href="/" class="bg-gray-300 text-gray-700 px-6 py-2 rounded hover:bg-gray-400">
                        Отмена
                    </a>
                </div>
                <p class="text-sm text-gray-500">* - обязательные поля</p>
            </div>
        </form>
    </div>
</body>
</html>
